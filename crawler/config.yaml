# ============================================================
# 부동산 매물 검색 조건 설정
# ============================================================

search:
  # 거래 유형 (A1: 매매, B2: 월세) — 매매 우선 처리
  trade_types:
    - A1   # 매매
    - B2   # 월세

  # 매매 조건
  purchase:
    min_price: 60000    # 최소 가격 (만원) — 6억
    max_price: 100000   # 최대 가격 (만원) — 10억

  # 월세 조건 (추후 상세 설정 예정)
  monthly_rent:
    max_deposit: 50000  # 최대 보증금 (만원) — 5억
    max_rent:    200    # 최대 월세 (만원)

  # 최소 전용면적 (㎡)
  # 공급면적 20평 기준 → 전용면적 약 49㎡
  min_area_sqm: 49

  # 검색 대상: 서울특별시 전체 (25개 구)
  target_city: 서울특별시

  # 선호 지역 — 이 구에 속하면 보너스 점수 부여
  preferred_districts:
    - 용산구
    - 동작구
    - 서초구
    - 강남구
    - 중구
    - 성동구

# ============================================================
# 점수 가중치 (각 항목 만점의 합 = 100점)
# ============================================================

scoring:
  purchase:
    price:              35   # 가격 (낮을수록 고점, 6억=35점 / 10억=0점)
    area:               30   # 면적 (클수록 고점, 20평=12점 / 40평+=30점)
    preferred_district: 20   # 선호 지역 여부 (해당 구면 20점, 아니면 0점)
    subway:             15   # 역세권 여부 (태그 기준, 해당되면 15점)

  monthly_rent:
    rent_cost:          35   # 월 실부담금 (낮을수록 고점)
    area:               30   # 면적 (클수록 고점)
    preferred_district: 20   # 선호 지역 여부
    subway:             15   # 역세권 여부

# ============================================================
# 보고서 설정
# ============================================================

report:
  top_n:      20          # 보고서에 표시할 상위 매물 수
  output_dir: output      # 보고서 저장 디렉토리
